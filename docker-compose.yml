services:
  cms:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - cms-data:/app/.tmp
      - cms-uploads:/app/public/uploads
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=1337
      - APP_KEYS=${APP_KEYS}
      - API_TOKEN_SALT=${API_TOKEN_SALT}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - TRANSFER_TOKEN_SALT=${TRANSFER_TOKEN_SALT}
      - JWT_SECRET=${JWT_SECRET}
      - PUBLIC_URL=${PUBLIC_URL:-http://localhost:1337}
      - DATABASE_CLIENT=sqlite
      - DATABASE_FILENAME=.tmp/data.db
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - VITE_STRAPI_URL=http://cms:1337
      - VITE_STRAPI_PUBLIC_URL=
      - NODE_ENV=production
    depends_on:
      - cms
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend
      - cms
    networks:
      - internal

volumes:
  cms-data:
  cms-uploads:
  caddy-data:
  caddy-config:

networks:
  internal:
